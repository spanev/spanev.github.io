  summary: Research Scientist & Investigator with 15+ years of experience in Computer Vision and Machine Learning. Expert in developing vision systems based on Foundational Generative Models and Vision-Language Models (VLMs) for complex scene understanding, adversarial robustness, and synthetic data generation. Proven track record of securing and leading high-impact research projects funded by international agencies, industry leaders, like General Motors, Sony, and the U.S. Government (Department of Defense). Supervised by Professor Fernando De la Torre (CMU), Professor Jessica Hodgins (CMU), and Professor Shayok Chakraborty (FSU). Extensive experience mentoring PhD and MSc students at Carnegie Mellon University.

