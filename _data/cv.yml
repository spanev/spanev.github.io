    References:
      - name: Professor Fernando De la Torre
        icon: fa-solid fa-thumbtack
        reference: Fernando De la Torre received his B.Sc. degree in Telecommunications, as well as his M.Sc. and Ph. D degrees in Electronic Engineering from La Salle School of Engineering at Ramon Llull University, Barcelona, Spain in 1994, 1996, and 2002, respectively. He has been a research faculty member in the Robotics Institute at Carnegie Mellon University since 2005 (currently Research Professor). In 2014 he founded FacioMetrics LLC to license technology for facial image analysis (acquired by Facebook in 2016). His research interests are in the fields of Computer Vision and Machine Learning. In particular, applications to human health, augmented reality, virtual reality, and methods that focus on the data (not the model). He is directing the Human Sensing Laboratory (HSL).

      - name: Professor Jessica K. Hodgins
        icon: fa-solid fa-thumbtack
        reference: Jessica Hodgins is a Professor in the Robotics Institute and Computer Science Department at Carnegie Mellon University. From 2008-2016, she founded and ran research labs for Disney, rising to VP of Research and leading the labs in Pittsburgh and Los Angeles. From 2005-2015, she was Associate Director for Faculty in the Robotics Institute, running the promotion and tenure process and creating a mentoring program for pre-tenure faculty. Prior to moving to Carnegie Mellon in 2000, she was an Associate Professor and Assistant Dean in the College of Computing at Georgia Institute of Technology. She received her Ph.D. in Computer Science from Carnegie Mellon University in 1989. Her research focuses on computer graphics, animation, and robotics with an emphasis on generating and analyzing human motion. She has received a NSF Young Investigator Award, a Packard Fellowship, and a Sloan Fellowship. She was editor-in-chief of ACM Transactions on Graphics from 2000-2002 and ACM SIGGRAPH Papers Chair in 2003. She was an elected director at large on the ACM SIGGRAPH Executive Committee from 2012-2017 and in 2017 she was elected ACM SIGGRAPH President. In 2010, she was awarded the ACM SIGGRAPH Computer Graphics Achievement Award and in 2017 she was awarded the Steven Anson Coons Award for Outstanding Creative Contributions to Computer Graphics. 

      - name: Professor Shayok Chakraborty
        icon: fa-solid fa-thumbtack
        reference: Shayok Chakraborty is an Associate Professor in the Computer Science Department at Florida State University. He has served as the Director of the MS program in Computer Science at FSU (08/2023 – 06/2024). He was a Visiting Faculty member at the Robotics Institute, Carnegie Mellon University (09/2024 – 06/2025). He received his PhD in Computer Science from Arizona State University in 2013. Prior to joining FSU, he was employed as an Assistant Research Professor at ASU, where he was an Associate Director of the Center for Cognitive Ubiquitous Computing (CUbiC) laboratory. He has worked as a Postdoctoral researcher at Intel Labs, Oregon, and in the Electrical and Computer Engineering department at Carnegie Mellon University. He also pursued a research internship in the Machine Learning department at Microsoft Research, Redmond. His research interests include Machine Learning, Computer Vision, and AI for Healthcare.
